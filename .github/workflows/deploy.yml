name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKER_IMAGE_NAME: hybrid-rag-api

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install testing tools (in a real project, these might be in requirements-dev.txt)
        pip install pytest httpx

    # In a full project, we'd run unit tests here:
    # - name: Run Pytest
    #   run: |
    #     pytest tests/

    - name: Build Docker Image (Dry Run)
      run: |
        docker build -t ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }} .

  # Deployment job (Mock for Portfolio purposes)
  deploy:
    needs: build_and_test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Amazon ECR (Placeholder)
      run: |
        echo "Authentication to AWS ECR would happen here via aws-actions/configure-aws-credentials"
        echo "Simulating ECR login..."

    - name: Push to AWS ECR (Placeholder)
      run: |
        echo "docker build -t \$AWS_ACCOUNT_ID.dkr.ecr.\$AWS_REGION.amazonaws.com/${{ env.DOCKER_IMAGE_NAME }}:latest ."
        echo "docker push \$AWS_ACCOUNT_ID.dkr.ecr.\$AWS_REGION.amazonaws.com/${{ env.DOCKER_IMAGE_NAME }}:latest"
        echo "Simulating push to AWS..."

    - name: Update ECS Service / EC2 Instance (Placeholder)
      run: |
        echo "Deploying new image to production cluster..."
        echo "Deployment successful."
